services:
  travelbuddy-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelbuddy-api
    env_file:
      - .env
    environment:
      PORT: 8000
      OPENAI_MODEL: gpt-4o-mini
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
